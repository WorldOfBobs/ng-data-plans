<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigeria Data Plan Comparator</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f1a;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:16px}
  h1{text-align:center;font-size:1.4rem;margin-bottom:4px;color:#fff}
  .subtitle{text-align:center;color:#888;font-size:.85rem;margin-bottom:16px}
  .updated{text-align:center;color:#555;font-size:.75rem;margin-bottom:20px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;justify-content:center}
  select,button{background:#1e1e30;color:#e0e0e0;border:1px solid #333;border-radius:8px;padding:8px 12px;font-size:.85rem;cursor:pointer}
  select:focus,button:focus{outline:none;border-color:#555}
  button.active{background:#2d2d50;border-color:#6060c0}
  .sort-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .sort-btn{background:#1a1a2e;border:1px solid #2a2a45;border-radius:20px;color:#aaa;padding:6px 14px;font-size:.8rem}
  .sort-btn.active{background:#2a2a6e;border-color:#5555cc;color:#fff}
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{background:#1a1a2e;border-radius:12px;padding:16px;border:1px solid #252540;position:relative;overflow:hidden}
  .card.best{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,.15)}
  .card.good{border-color:#3a3a6a}
  .card.poor{border-color:#2a1a1a}
  .badge{position:absolute;top:10px;right:10px;font-size:.7rem;padding:3px 8px;border-radius:20px;font-weight:700}
  .badge.best{background:#ffd700;color:#000}
  .badge.good{background:#2d6a2d;color:#9eff9e}
  .badge.poor{background:#3a1a1a;color:#ff6666}
  .telco{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .telco-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .telco-name{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.05em}
  .plan-gb{font-size:2rem;font-weight:700;color:#fff;line-height:1}
  .plan-gb span{font-size:.9rem;color:#888;font-weight:400}
  .plan-price{font-size:1.1rem;color:#ccc;margin:4px 0}
  .plan-days{font-size:.75rem;color:#666;margin-bottom:10px}
  .value-bar{background:#111;border-radius:4px;height:6px;margin-top:10px;overflow:hidden}
  .value-fill{height:100%;border-radius:4px;transition:width .3s}
  .value-score{font-size:.72rem;color:#666;margin-top:5px}
  .no-results{text-align:center;padding:40px;color:#555;grid-column:1/-1}
  .telco-filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  .telco-btn{border-radius:20px;font-size:.8rem;padding:5px 14px;border-width:1px}
</style>
</head>
<body>
<h1>🇳🇬 Nigeria Data Plans</h1>
<p class="subtitle">Compare GB-per-naira across all major networks</p>
<p class="updated">Updated: March 2025 · Tap a card to dial USSD</p>

<div class="filters">
  <select id="minData">
    <option value="0">All sizes</option>
    <option value="1">≥ 1 GB</option>
    <option value="5">≥ 5 GB</option>
    <option value="10">≥ 10 GB</option>
    <option value="20">≥ 20 GB</option>
  </select>
  <select id="maxPrice">
    <option value="999999">Any price</option>
    <option value="1000">≤ ₦1,000</option>
    <option value="2000">≤ ₦2,000</option>
    <option value="5000">≤ ₦5,000</option>
  </select>
</div>

<div class="telco-filters">
  <button class="telco-btn active" data-telco="all" style="background:#1e1e30;border-color:#555;color:#fff">All</button>
  <button class="telco-btn" data-telco="MTN" style="background:#1a1400;border-color:#ffcc00;color:#ffcc00">🟡 MTN</button>
  <button class="telco-btn" data-telco="Airtel" style="background:#1a0000;border-color:#ff3333;color:#ff6666">🔴 Airtel</button>
  <button class="telco-btn" data-telco="Glo" style="background:#001a00;border-color:#33cc33;color:#66ff66">🟢 Glo</button>
  <button class="telco-btn" data-telco="9mobile" style="background:#0a001a;border-color:#9933ff;color:#bb77ff">🟣 9mobile</button>
</div>

<div class="sort-row">
  <button class="sort-btn active" data-sort="value">Best value</button>
  <button class="sort-btn" data-sort="price">Cheapest</button>
  <button class="sort-btn" data-sort="data">Most data</button>
</div>

<div class="grid" id="grid"></div>

<script>
const PLANS = [
  // MTN
  {telco:"MTN",gb:1,price:1000,days:30,ussd:"*131*1#",color:"#ffcc00"},
  {telco:"MTN",gb:2,price:2000,days:30,ussd:"*131*1#",color:"#ffcc00"},
  {telco:"MTN",gb:5,price:3500,days:30,ussd:"*131*1#",color:"#ffcc00"},
  {telco:"MTN",gb:10,price:5000,days:30,ussd:"*131*1#",color:"#ffcc00"},
  {telco:"MTN",gb:15,price:6000,days:30,ussd:"*131*1#",color:"#ffcc00"},
  // Airtel
  {telco:"Airtel",gb:1,price:1000,days:30,ussd:"*141*712*0#",color:"#ff3333"},
  {telco:"Airtel",gb:2,price:1500,days:30,ussd:"*141*712*0#",color:"#ff3333"},
  {telco:"Airtel",gb:5,price:3000,days:30,ussd:"*141*712*0#",color:"#ff3333"},
  {telco:"Airtel",gb:10,price:5000,days:30,ussd:"*141*712*0#",color:"#ff3333"},
  {telco:"Airtel",gb:20,price:8000,days:30,ussd:"*141*712*0#",color:"#ff3333"},
  // Glo
  {telco:"Glo",gb:1.35,price:500,days:14,ussd:"*777#",color:"#33cc33"},
  {telco:"Glo",gb:2.9,price:1000,days:30,ussd:"*777#",color:"#33cc33"},
  {telco:"Glo",gb:7.7,price:2000,days:30,ussd:"*777#",color:"#33cc33"},
  {telco:"Glo",gb:15,price:3000,days:30,ussd:"*777#",color:"#33cc33"},
  {telco:"Glo",gb:29.5,price:5000,days:30,ussd:"*777#",color:"#33cc33"},
  // 9mobile
  {telco:"9mobile",gb:1,price:1000,days:30,ussd:"*229*2*1#",color:"#9933ff"},
  {telco:"9mobile",gb:2.5,price:2000,days:30,ussd:"*229*2*1#",color:"#9933ff"},
  {telco:"9mobile",gb:11.5,price:4000,days:30,ussd:"*229*2*1#",color:"#9933ff"},
  {telco:"9mobile",gb:22,price:8000,days:30,ussd:"*229*2*1#",color:"#9933ff"},
];

// compute value: MB per ₦100
PLANS.forEach(p => { p.value = (p.gb * 1024) / (p.price / 100); });
const maxVal = Math.max(...PLANS.map(p=>p.value));

let sortBy = "value";
let filterTelco = "all";

function tier(p) {
  const ratio = p.value / maxVal;
  if (ratio >= 0.75) return "best";
  if (ratio >= 0.4) return "good";
  return "poor";
}
function tierLabel(t) {
  if (t==="best") return "Best Value";
  if (t==="good") return "Good";
  return "Low Value";
}

function render() {
  const minGb = parseFloat(document.getElementById("minData").value);
  const maxP  = parseFloat(document.getElementById("maxPrice").value);
  let plans = PLANS.filter(p => p.gb >= minGb && p.price <= maxP);
  if (filterTelco !== "all") plans = plans.filter(p => p.telco === filterTelco);
  if (sortBy === "value") plans.sort((a,b) => b.value - a.value);
  if (sortBy === "price") plans.sort((a,b) => a.price - b.price);
  if (sortBy === "data")  plans.sort((a,b) => b.gb - a.gb);

  const grid = document.getElementById("grid");
  if (!plans.length) { grid.innerHTML = '<p class="no-results">No plans match your filters</p>'; return; }

  grid.innerHTML = plans.map(p => {
    const t = tier(p);
    const fill = Math.round((p.value / maxVal) * 100);
    const fillColor = t==="best"?"#ffd700":t==="good"?"#3a9a3a":"#6a2020";
    const gbDisplay = Number.isInteger(p.gb) ? p.gb : p.gb.toFixed(2);
    return `<div class="card ${t}" onclick="location.href='tel:${p.ussd}'" style="cursor:pointer">
      <span class="badge ${t}">${tierLabel(t)}</span>
      <div class="telco">
        <div class="telco-dot" style="background:${p.color}"></div>
        <span class="telco-name">${p.telco}</span>
      </div>
      <div class="plan-gb">${gbDisplay}<span> GB</span></div>
      <div class="plan-price">₦${p.price.toLocaleString()}</div>
      <div class="plan-days">${p.days} days · Tap to dial ${p.ussd}</div>
      <div class="value-bar"><div class="value-fill" style="width:${fill}%;background:${fillColor}"></div></div>
      <div class="value-score">${Math.round(p.value)} MB per ₦100 spent</div>
    </div>`;
  }).join("");
}

document.getElementById("minData").addEventListener("change", render);
document.getElementById("maxPrice").addEventListener("change", render);
document.querySelectorAll(".sort-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".sort-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    sortBy = b.dataset.sort;
    render();
  });
});
document.querySelectorAll(".telco-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".telco-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    filterTelco = b.dataset.telco;
    render();
  });
});

render();
</script>
</body>
</html>
