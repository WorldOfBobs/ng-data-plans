<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇳🇬 Nigeria Fuel Queue Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;display:flex;flex-direction:column;height:100vh}
  header{padding:10px 16px;background:#1a1a2e;border-bottom:1px solid #252545;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  header h1{font-size:1rem;color:#fff}
  .legend{display:flex;gap:12px;font-size:.72rem;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:4px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  #map{flex:1}
  .refresh-btn{background:#2d2d60;border:1px solid #4444aa;color:#ccc;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.75rem}
  /* Modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;align-items:flex-end;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:#1a1a2e;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
  .modal h2{font-size:1rem;margin-bottom:12px;color:#fff}
  label{display:block;font-size:.8rem;color:#aaa;margin:10px 0 4px}
  input,select,textarea{width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#e0e0e0;padding:8px;font-size:.85rem}
  input:focus,select:focus{outline:none;border-color:#5555cc}
  .btn-row{display:flex;gap:8px;margin-top:16px}
  .btn{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600}
  .btn-primary{background:#4444cc;color:#fff}
  .btn-cancel{background:#333;color:#ccc}
  .status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
  .pill-available{background:#1a4a1a;color:#66ff66}
  .pill-long_queue{background:#4a4a00;color:#ffff66}
  .pill-dry{background:#4a0000;color:#ff6666}
  .pill-unknown{background:#222;color:#888}
  .add-btn{position:fixed;bottom:20px;right:20px;z-index:1000;background:#4444cc;color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:.85rem;cursor:pointer;box-shadow:0 4px 20px rgba(68,68,204,.4)}
</style>
</head>
<body>
<header>
  <h1>🇳🇬 Fuel Queue Map</h1>
  <div class="legend">
    <span><span class="dot" style="background:#44ff44"></span>Available</span>
    <span><span class="dot" style="background:#ffff00"></span>Long queue</span>
    <span><span class="dot" style="background:#ff4444"></span>Dry</span>
    <span><span class="dot" style="background:#444"></span>No report</span>
  </div>
  <button class="refresh-btn" onclick="loadStations()">↻ Refresh</button>
</header>
<div id="map"></div>
<button class="add-btn" onclick="openAddStation()">+ Add Station</button>

<!-- Report modal -->
<div class="modal-bg" id="reportModal">
  <div class="modal">
    <h2 id="reportTitle">Report Station</h2>
    <input type="hidden" id="reportStationId">
    <label>Status *</label>
    <select id="reportStatus">
      <option value="available">✅ Fuel available</option>
      <option value="long_queue">⏳ Long queue</option>
      <option value="dry">❌ No fuel (dry)</option>
    </select>
    <label>Price per litre (₦, optional)</label>
    <input type="number" id="reportPrice" placeholder="e.g. 617" min="0" max="9999">
    <label>Queue length</label>
    <select id="reportQueue">
      <option value="none">No queue</option>
      <option value="short">Short (&lt;10 cars)</option>
      <option value="long">Long (10–30 cars)</option>
      <option value="very_long">Very long (30+ cars)</option>
    </select>
    <label>Your nickname (optional)</label>
    <input type="text" id="reportNickname" placeholder="Anonymous" maxlength="40">
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal('reportModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitReport()">Submit Report</button>
    </div>
  </div>
</div>

<!-- Add station modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h2>Add New Station</h2>
    <p style="font-size:.8rem;color:#888;margin-bottom:10px">Click on the map to place the pin, then fill in the name.</p>
    <label>Station Name *</label>
    <input type="text" id="addName" placeholder="e.g. NNPC Lekki Phase 2" maxlength="120">
    <label>Latitude</label>
    <input type="number" id="addLat" placeholder="Will fill from map click" step="0.0001" readonly>
    <label>Longitude</label>
    <input type="number" id="addLng" placeholder="Will fill from map click" step="0.0001" readonly>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitStation()">Add Station</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([9.0820, 8.6753], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

let markers = {};
let addingStation = false;
let tempMarker = null;

function statusColor(status) {
  if (status === 'available') return '#44ff44';
  if (status === 'long_queue') return '#ffff00';
  if (status === 'dry') return '#ff4444';
  return '#444444';
}

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 0 6px ${color}88"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
}

function pillHtml(status) {
  const labels = {available:'✅ Available', long_queue:'⏳ Long queue', dry:'❌ Dry', null:'❓ No report'};
  const cls = status || 'unknown';
  return `<span class="status-pill pill-${cls}">${labels[status] || '❓ No report'}</span>`;
}

async function loadStations() {
  const res = await fetch('/api/stations');
  const stations = await res.json();
  // Remove old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  stations.forEach(s => {
    const color = statusColor(s.status);
    const m = L.marker([s.lat, s.lng], {icon: makeIcon(color)}).addTo(map);
    const price = s.price_per_litre ? `₦${s.price_per_litre}/L` : 'Price unknown';
    const when = s.reported_at ? new Date(s.reported_at + 'Z').toLocaleTimeString() : 'No recent report';
    const reporter = s.reporter_nickname || 'Anonymous';
    const count = s.report_count || 0;
    m.bindPopup(`
      <div style="min-width:200px;font-family:system-ui;color:#111">
        <strong style="font-size:.9rem">${s.name}</strong><br>
        <div style="margin:6px 0">${pillHtml(s.status)}</div>
        <div style="font-size:.8rem;color:#555">${price} · Queue: ${s.queue_length || 'unknown'}</div>
        <div style="font-size:.75rem;color:#888;margin:4px 0">Last report: ${when} by ${reporter}</div>
        <div style="font-size:.75rem;color:#888">${count} report(s) in 6h</div>
        <button onclick="openReport(${s.id},'${s.name.replace(/'/g,"\\'")}'); map.closePopup()"
          style="margin-top:8px;width:100%;padding:6px;background:#4444cc;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem">
          📝 Report this station
        </button>
      </div>
    `);
    markers[s.id] = m;
  });
}

function openReport(id, name) {
  document.getElementById('reportStationId').value = id;
  document.getElementById('reportTitle').textContent = `Report: ${name}`;
  document.getElementById('reportPrice').value = '';
  document.getElementById('reportNickname').value = '';
  document.getElementById('reportModal').classList.add('open');
}

function openAddStation() {
  addingStation = true;
  document.getElementById('addModal').classList.add('open');
  document.getElementById('addLat').value = '';
  document.getElementById('addLng').value = '';
  document.getElementById('addName').value = '';
  map.getContainer().style.cursor = 'crosshair';
}

map.on('click', function(e) {
  if (!addingStation) return;
  if (tempMarker) map.removeLayer(tempMarker);
  tempMarker = L.marker(e.latlng).addTo(map);
  document.getElementById('addLat').value = e.latlng.lat.toFixed(6);
  document.getElementById('addLng').value = e.latlng.lng.toFixed(6);
});

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'addModal') {
    addingStation = false;
    map.getContainer().style.cursor = '';
    if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
  }
}

async function submitReport() {
  const payload = {
    station_id: parseInt(document.getElementById('reportStationId').value),
    status: document.getElementById('reportStatus').value,
    price_per_litre: parseFloat(document.getElementById('reportPrice').value) || null,
    queue_length: document.getElementById('reportQueue').value,
    reporter_nickname: document.getElementById('reportNickname').value || null,
  };
  const res = await fetch('/api/reports', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
  });
  if (res.ok) {
    closeModal('reportModal');
    await loadStations();
    alert('✅ Report submitted! Thanks for helping!');
  } else {
    const err = await res.json();
    alert('❌ ' + (err.detail || 'Error submitting report'));
  }
}

async function submitStation() {
  const name = document.getElementById('addName').value.trim();
  const lat = parseFloat(document.getElementById('addLat').value);
  const lng = parseFloat(document.getElementById('addLng').value);
  if (!name) { alert('Please enter a station name'); return; }
  if (!lat || !lng) { alert('Please click on the map to place the station'); return; }
  const res = await fetch('/api/stations', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, lat, lng})
  });
  if (res.ok) {
    closeModal('addModal');
    await loadStations();
    alert('✅ Station added!');
  } else {
    alert('❌ Error adding station');
  }
}

// Auto-refresh every 5 minutes
loadStations();
setInterval(loadStations, 300000);
</script>
</body>
</html>
