<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigeria Data Plans & Coverage</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f1a;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:16px}
  h1{text-align:center;font-size:1.4rem;margin-bottom:4px;color:#fff}
  .subtitle{text-align:center;color:#888;font-size:.85rem;margin-bottom:12px}
  .updated{text-align:center;color:#555;font-size:.75rem;margin-bottom:18px}

  /* ── Tab bar ── */
  .tabs{display:flex;justify-content:center;margin-bottom:20px}
  .tabs-inner{display:flex;border:1px solid #2e2e4e;border-radius:12px;overflow:hidden}
  .tab-btn{background:#1a1a2e;color:#888;border:none;padding:10px 30px;font-size:.9rem;cursor:pointer;transition:background .2s,color .2s;white-space:nowrap}
  .tab-btn.active{background:#2d2d50;color:#fff;font-weight:600}

  /* ── Plans tab ── */
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;justify-content:center}
  select,button{background:#1e1e30;color:#e0e0e0;border:1px solid #333;border-radius:8px;padding:8px 12px;font-size:.85rem;cursor:pointer}
  select:focus,button:focus{outline:none;border-color:#555}
  .sort-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .sort-btn{background:#1a1a2e;border:1px solid #2a2a45;border-radius:20px;color:#aaa;padding:6px 14px;font-size:.8rem}
  .sort-btn.active{background:#2a2a6e;border-color:#5555cc;color:#fff}
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:600px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:900px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{background:#1a1a2e;border-radius:12px;padding:16px;border:1px solid #252540;position:relative;overflow:hidden}
  .card.best{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,.15)}
  .card.good{border-color:#3a3a6a}
  .card.poor{border-color:#2a1a1a}
  .badge{position:absolute;top:10px;right:10px;font-size:.7rem;padding:3px 8px;border-radius:20px;font-weight:700}
  .badge.best{background:#ffd700;color:#000}
  .badge.good{background:#2d6a2d;color:#9eff9e}
  .badge.poor{background:#3a1a1a;color:#ff6666}
  .telco{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .telco-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .telco-name{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.05em}
  .plan-gb{font-size:2rem;font-weight:700;color:#fff;line-height:1}
  .plan-gb span{font-size:.9rem;color:#888;font-weight:400}
  .plan-price{font-size:1.1rem;color:#ccc;margin:4px 0}
  .plan-days{font-size:.75rem;color:#666;margin-bottom:10px}
  .value-bar{background:#111;border-radius:4px;height:6px;margin-top:10px;overflow:hidden}
  .value-fill{height:100%;border-radius:4px;transition:width .3s}
  .value-score{font-size:.72rem;color:#666;margin-top:5px}
  .no-results{text-align:center;padding:40px;color:#555;grid-column:1/-1}
  .telco-filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  .telco-btn{border-radius:20px;font-size:.8rem;padding:5px 14px;border-width:1px}

  /* ── Coverage tab ── */
  #coverage-section{display:none}
  .coverage-carrier-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
  .cov-btn{border-radius:20px;font-size:.85rem;padding:7px 18px;border-width:2px;font-weight:600;opacity:.55;transition:opacity .2s,transform .1s}
  .cov-btn.active{opacity:1;transform:scale(1.06)}
  #map{height:520px;border-radius:14px;overflow:hidden;border:1px solid #252540}
  .map-legend{display:flex;gap:18px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:.8rem;color:#aaa}
  .legend-swatch{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,.1)}
  .coverage-note{text-align:center;color:#444;font-size:.72rem;margin-top:10px}

  /* Leaflet tooltip override for dark theme */
  .leaflet-tooltip{background:#1a1a2e;border:1px solid #333;color:#e0e0e0;font-size:.8rem;padding:5px 10px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.5)}
  .leaflet-tooltip::before{border-top-color:#333}
</style>
</head>
<body>
<h1>🇳🇬 Nigeria Data Plans</h1>
<p class="subtitle">Compare GB-per-naira · Check coverage by network</p>
<p class="updated">Updated: March 2025 · Tap a plan card to dial USSD</p>

<!-- Tab navigation -->
<div class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" id="tab-plans" onclick="showTab('plans')">📊 Plans</button>
    <button class="tab-btn" id="tab-coverage" onclick="showTab('coverage')">🗺️ Coverage Map</button>
  </div>
</div>

<!-- ════════════════ PLANS TAB ════════════════ -->
<div id="plans-section">
  <div class="filters">
    <select id="minData">
      <option value="0">All sizes</option>
      <option value="1">≥ 1 GB</option>
      <option value="5">≥ 5 GB</option>
      <option value="10">≥ 10 GB</option>
      <option value="20">≥ 20 GB</option>
    </select>
    <select id="maxPrice">
      <option value="999999">Any price</option>
      <option value="1000">≤ ₦1,000</option>
      <option value="2000">≤ ₦2,000</option>
      <option value="5000">≤ ₦5,000</option>
    </select>
  </div>

  <div class="telco-filters">
    <button class="telco-btn active" data-telco="all" style="background:#1e1e30;border-color:#555;color:#fff">All</button>
    <button class="telco-btn" data-telco="MTN" style="background:#1a1400;border-color:#ffcc00;color:#ffcc00">🟡 MTN</button>
    <button class="telco-btn" data-telco="Airtel" style="background:#1a0000;border-color:#ff3333;color:#ff6666">🔴 Airtel</button>
    <button class="telco-btn" data-telco="Glo" style="background:#001a00;border-color:#33cc33;color:#66ff66">🟢 Glo</button>
    <button class="telco-btn" data-telco="9mobile" style="background:#0a001a;border-color:#9933ff;color:#bb77ff">🟣 9mobile</button>
  </div>

  <div class="sort-row">
    <button class="sort-btn active" data-sort="value">Best value</button>
    <button class="sort-btn" data-sort="price">Cheapest</button>
    <button class="sort-btn" data-sort="data">Most data</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- ════════════════ COVERAGE TAB ════════════════ -->
<div id="coverage-section">
  <div class="coverage-carrier-row">
    <button class="cov-btn active" data-carrier="MTN"
      style="background:#1a1400;border-color:#ffcc00;color:#ffcc00">🟡 MTN</button>
    <button class="cov-btn" data-carrier="Airtel"
      style="background:#1a0000;border-color:#ff3333;color:#ff6666">🔴 Airtel</button>
    <button class="cov-btn" data-carrier="Glo"
      style="background:#001a00;border-color:#33cc33;color:#66ff66">🟢 Glo</button>
    <button class="cov-btn" data-carrier="9mobile"
      style="background:#0a001a;border-color:#9933ff;color:#bb77ff">🟣 9mobile</button>
  </div>

  <div id="map"></div>

  <div class="map-legend" id="map-legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:#1c1c2e;border:1px solid #333;"></div>
      <span>No towers</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" id="swatch-heat" style="width:80px;border-radius:4px;"></div>
      <span>Low → High density</span>
    </div>
  </div>
  <p class="coverage-note">Source: OpenCelliD · 102,000+ cell tower locations · Last 18 months · Zoom in for city-level detail</p>
</div>

<script>
// ──────────────────────────────────────────────
// Tab switching
// ──────────────────────────────────────────────
function showTab(name) {
  document.getElementById('plans-section').style.display    = name==='plans'    ? 'block' : 'none';
  document.getElementById('coverage-section').style.display = name==='coverage' ? 'block' : 'none';
  document.getElementById('tab-plans').classList.toggle('active',    name==='plans');
  document.getElementById('tab-coverage').classList.toggle('active', name==='coverage');
  if (name === 'coverage') {
    if (!mapInitialized) initMap();
    else setTimeout(() => leafletMap && leafletMap.invalidateSize(), 100);
  }
}

// ──────────────────────────────────────────────
// Plans data
// ──────────────────────────────────────────────
const PLANS = [
  {telco:"MTN",   gb:1,    price:1000, days:30, ussd:"*131*1#",      color:"#ffcc00"},
  {telco:"MTN",   gb:2,    price:2000, days:30, ussd:"*131*1#",      color:"#ffcc00"},
  {telco:"MTN",   gb:5,    price:3500, days:30, ussd:"*131*1#",      color:"#ffcc00"},
  {telco:"MTN",   gb:10,   price:5000, days:30, ussd:"*131*1#",      color:"#ffcc00"},
  {telco:"MTN",   gb:15,   price:6000, days:30, ussd:"*131*1#",      color:"#ffcc00"},
  {telco:"Airtel",gb:1,    price:1000, days:30, ussd:"*141*712*0#",  color:"#ff3333"},
  {telco:"Airtel",gb:2,    price:1500, days:30, ussd:"*141*712*0#",  color:"#ff3333"},
  {telco:"Airtel",gb:5,    price:3000, days:30, ussd:"*141*712*0#",  color:"#ff3333"},
  {telco:"Airtel",gb:10,   price:5000, days:30, ussd:"*141*712*0#",  color:"#ff3333"},
  {telco:"Airtel",gb:20,   price:8000, days:30, ussd:"*141*712*0#",  color:"#ff3333"},
  {telco:"Glo",   gb:1.35, price:500,  days:14, ussd:"*777#",        color:"#33cc33"},
  {telco:"Glo",   gb:2.9,  price:1000, days:30, ussd:"*777#",        color:"#33cc33"},
  {telco:"Glo",   gb:7.7,  price:2000, days:30, ussd:"*777#",        color:"#33cc33"},
  {telco:"Glo",   gb:15,   price:3000, days:30, ussd:"*777#",        color:"#33cc33"},
  {telco:"Glo",   gb:29.5, price:5000, days:30, ussd:"*777#",        color:"#33cc33"},
  {telco:"9mobile",gb:1,   price:1000, days:30, ussd:"*229*2*1#",    color:"#9933ff"},
  {telco:"9mobile",gb:2.5, price:2000, days:30, ussd:"*229*2*1#",    color:"#9933ff"},
  {telco:"9mobile",gb:11.5,price:4000, days:30, ussd:"*229*2*1#",    color:"#9933ff"},
  {telco:"9mobile",gb:22,  price:8000, days:30, ussd:"*229*2*1#",    color:"#9933ff"},
];
PLANS.forEach(p => { p.value = (p.gb * 1024) / (p.price / 100); });
const maxVal = Math.max(...PLANS.map(p=>p.value));

let sortBy='value', filterTelco='all';

function tier(p){
  const r=p.value/maxVal;
  return r>=0.75?'best':r>=0.4?'good':'poor';
}
function tierLabel(t){return t==='best'?'Best Value':t==='good'?'Good':'Low Value';}

function render(){
  const minGb=parseFloat(document.getElementById('minData').value);
  const maxP =parseFloat(document.getElementById('maxPrice').value);
  let plans=PLANS.filter(p=>p.gb>=minGb&&p.price<=maxP);
  if(filterTelco!=='all') plans=plans.filter(p=>p.telco===filterTelco);
  if(sortBy==='value') plans.sort((a,b)=>b.value-a.value);
  if(sortBy==='price') plans.sort((a,b)=>a.price-b.price);
  if(sortBy==='data')  plans.sort((a,b)=>b.gb-a.gb);
  const grid=document.getElementById('grid');
  if(!plans.length){grid.innerHTML='<p class="no-results">No plans match your filters</p>';return;}
  grid.innerHTML=plans.map(p=>{
    const t=tier(p);
    const fill=Math.round((p.value/maxVal)*100);
    const fillColor=t==='best'?'#ffd700':t==='good'?'#3a9a3a':'#6a2020';
    const gbDisplay=Number.isInteger(p.gb)?p.gb:p.gb.toFixed(2);
    return `<div class="card ${t}" onclick="location.href='tel:${p.ussd}'" style="cursor:pointer">
      <span class="badge ${t}">${tierLabel(t)}</span>
      <div class="telco"><div class="telco-dot" style="background:${p.color}"></div>
      <span class="telco-name">${p.telco}</span></div>
      <div class="plan-gb">${gbDisplay}<span> GB</span></div>
      <div class="plan-price">₦${p.price.toLocaleString()}</div>
      <div class="plan-days">${p.days} days · Tap to dial ${p.ussd}</div>
      <div class="value-bar"><div class="value-fill" style="width:${fill}%;background:${fillColor}"></div></div>
      <div class="value-score">${Math.round(p.value)} MB per ₦100 spent</div>
    </div>`;
  }).join('');
}

document.getElementById('minData').addEventListener('change',render);
document.getElementById('maxPrice').addEventListener('change',render);
document.querySelectorAll('.sort-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.sort-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); sortBy=b.dataset.sort; render();
  });
});
document.querySelectorAll('.telco-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.telco-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); filterTelco=b.dataset.telco; render();
  });
});
render();

// ──────────────────────────────────────────────
// Coverage Map — real OpenCelliD tower density data
// ──────────────────────────────────────────────

const CARRIER_COLOR = {
  'MTN':    '#ffcc00',
  'Airtel': '#ff3333',
  'Glo':    '#33cc33',
  '9mobile':'#9933ff',
};

function hexRGB(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}

let mapInitialized = false;
let leafletMap, borderLayer;
let heatLayers = {};
let activeCarrier = 'MTN';

function applyCarrier(carrier) {
  activeCarrier = carrier;
  const hex = CARRIER_COLOR[carrier];
  document.getElementById('swatch-heat').style.background =
    `linear-gradient(to right, transparent, ${hex})`;
  Object.entries(heatLayers).forEach(([name, layer]) => {
    if (name === carrier) layer.addTo(leafletMap);
    else leafletMap.removeLayer(layer);
  });
}

function buildHeatLayer(carrier, cells) {
  const [r,g,b] = hexRGB(CARRIER_COLOR[carrier]);
  const points = cells.map(([lat,lon,v]) => [lat, lon, v/255]);
  return L.heatLayer(points, {
    radius: 22,
    blur: 18,
    maxZoom: 14,
    max: 1.0,
    gradient: {
      0.0:  'transparent',
      0.15: `rgba(${r},${g},${b},0.25)`,
      0.4:  `rgba(${r},${g},${b},0.65)`,
      0.7:  `rgba(${r},${g},${b},0.88)`,
      1.0:  `rgba(${r},${g},${b},1)`,
    },
  });
}

function initMap() {
  mapInitialized = true;

  leafletMap = L.map('map', {
    center: [9.0, 8.0],
    zoom: 6,
    zoomControl: true,
    attributionControl: false,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom: 14, subdomains: 'abcd',
  }).addTo(leafletMap);

  Promise.all([
    fetch('ng_coverage_grid.json').then(r => r.json()),
    fetch('nigeria-states.geojson').then(r => r.json()),
  ]).then(([grid, states]) => {
    Object.keys(CARRIER_COLOR).forEach(carrier => {
      if (grid[carrier]) heatLayers[carrier] = buildHeatLayer(carrier, grid[carrier]);
    });

    borderLayer = L.geoJSON(states, {
      style: { color: '#ffffff', weight: 0.7, opacity: 0.3, fill: false },
    }).addTo(leafletMap);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      maxZoom: 14, subdomains: 'abcd', pane: 'shadowPane',
    }).addTo(leafletMap);

    leafletMap.fitBounds(borderLayer.getBounds(), {padding:[10,10]});
    applyCarrier('MTN');
  }).catch(() => {
    document.getElementById('map').innerHTML =
      '<p style="color:#555;text-align:center;padding:40px">Coverage data failed to load.</p>';
  });
}

// Carrier toggle buttons
document.querySelectorAll('.cov-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.cov-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    applyCarrier(b.dataset.carrier);
  });
});
</script>
